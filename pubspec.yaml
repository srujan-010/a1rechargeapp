name: a1_recharge
description: A1 Recharge — Hyper-local B2B digital banking & utility platform for retailers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5

  # Animations
  lottie: ^3.3.1

  # Image Loading
  cached_network_image: ^3.4.1

  # Typography
  google_fonts: ^6.2.1

  # Responsive
  responsive_framework: ^1.5.1

  # Internationalization
  intl: ^0.20.2

  # Loading Skeletons
  shimmer: ^3.0.0

  # Connectivity
  connectivity_plus: ^6.1.4

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # QR Scanner
  mobile_scanner: ^6.0.5

  # Biometrics
  local_auth: ^2.3.0

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Value Equality (fallback)
  equatable: ^2.0.7

  # Sharing
  share_plus: ^10.1.4

  # URL Launcher
  url_launcher: ^6.3.2

  # PDF Generation
  pdf: ^3.11.3
  printing: ^5.14.2

  # Package Info
  package_info_plus: ^8.3.0

  # Path Provider
  path_provider: ^2.1.5

  # Flutter SVG (for icons)
  flutter_svg: ^2.0.17

  # Carousel
  carousel_slider: ^5.0.0

  # Smooth Page Indicator (for carousel)
  smooth_page_indicator: ^1.2.0+3

  # Icons
  cupertino_icons: ^1.0.8

  # OTP Text Field
  pinput: ^5.0.0

  # Date Picker
  table_calendar: ^3.1.3

  # Charts (for earnings)
  fl_chart: ^0.70.2

  # HTTP status
  http_status: ^2.1.0
  device_info_plus: ^12.4.0
  firebase_auth: ^5.7.0
  flutter_contacts: ^2.1.0
  permission_handler: ^12.0.3
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4
  flutter_launcher_icons: ^0.14.4

  # Testing
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^5.0.0

  # hive_generator removed: conflicts with riverpod_generator source_gen version
  # Hive is used with dynamic boxes only — no typed adapters needed in this project

  # riverpod_lint removed: conflicts with hive_generator analyzer version constraint
  # Re-add when hive_generator >=2.1 ships with analyzer ^7.0 support

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/
    - assets/icons/
    - assets/operator_registry.json

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#000000"
